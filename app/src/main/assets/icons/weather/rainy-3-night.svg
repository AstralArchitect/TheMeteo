<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" width="63.299999" height="63.299999" viewbox="0 0 17 17" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blur" width="2" height="2">
      <feComponentTransfer><feFuncA type="linear" slope="0.05" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <style type="text/css"><![CDATA[
@keyframes am-weather-cloud-2 { 0% { transform: translate(-2px,0px); } 50% { transform: translate(2px,0px); } 100% { transform: translate(-2px,0px); } }
.am-weather-cloud-2 { animation-name: am-weather-cloud-2; animation-duration: 3s; animation-timing-function: linear; animation-iteration-count: infinite; }
@keyframes am-weather-moon { 0% { transform: rotate(0deg); } 50% { transform: rotate(15deg); } 100% { transform: rotate(0deg); } }
.am-weather-moon { animation-name: am-weather-moon; animation-duration: 6s; animation-timing-function: linear; animation-iteration-count: infinite; transform-origin: 12.5px 15.15px 0; }
@keyframes am-weather-rain { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -100; } }
.am-weather-rain-1 { animation-name: am-weather-rain; animation-duration: 8s; animation-timing-function: linear; animation-iteration-count: infinite; }
.am-weather-rain-2 { animation-name: am-weather-rain; animation-duration: 8s; animation-delay: 0.25s; animation-timing-function: linear; animation-iteration-count: infinite; }
]]></style>
  </defs>
  <g filter="url(#blur)" id="rainy-3-night">
    <!-- MOON -->
    <g transform="matrix(0.3,0,0,0.3,10,2)">
      <g transform="matrix(0.8,0,0,0.8,16,4)">
        <g class="am-weather-moon">
          <path d="m 14.5,13.2 c 0,-3.7 2,-6.9 5,-8.7 -1.5,-0.9 -3.2,-1.3 -5,-1.3 -5.5,0 -10,4.5 -10,10 0,5.5 4.5,10 10,10 1.8,0 3.5,-0.5 5,-1.3 -3,-1.7 -5,-5 -5,-8.7 z" fill="#f9e491" stroke="#f9e491" stroke-linejoin="round" stroke-width="2" />
        </g>
      </g>
    </g>
    <!-- BASE RAINY-3 (Cloud + Rain) -->
    <g transform="matrix(1.2267759,0,0,1.2267759,16.784426,-1.8811465)">
      <g class="am-weather-cloud-2">
        <path d="m 47.7,35.4 c 0,-4.6 -3.7,-8.2 -8.2,-8.2 -1,0 -1.9,0.2 -2.8,0.5 -0.3,-3.4 -3.1,-6.2 -6.6,-6.2 -3.7,0 -6.7,3 -6.7,6.7 0,0.8 0.2,1.6 0.4,2.3 -0.3,-0.1 -0.7,-0.1 -1,-0.1 -3.7,0 -6.7,3 -6.7,6.7 0,3.6 2.9,6.6 6.5,6.7 h 17.2 c 4.4,-0.5 7.9,-4 7.9,-8.4 z" fill="#d4d4d4" transform="translate(-20,-11)" />
      </g>
    </g>
    <g transform="matrix(1.2081384,0.21302739,-0.21302739,1.2081384,30.278961,42.282783)">
      <line class="am-weather-rain-1" fill="none" stroke="#91c0f8" stroke-dasharray="4, 4" stroke-linecap="round" stroke-width="2" transform="translate(-4,1)" y2="8" />
      <line class="am-weather-rain-2" fill="none" stroke="#91c0f8" stroke-dasharray="4, 4" stroke-linecap="round" stroke-width="2" transform="translate(0,-1)" y2="8" />
      <line class="am-weather-rain-1" fill="none" stroke="#91c0f8" stroke-dasharray="4, 4" stroke-linecap="round" stroke-width="2" transform="translate(4)" y2="8" />
    </g>
  </g>
</svg>