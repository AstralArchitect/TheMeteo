<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" width="63.299999" height="63.299999" viewbox="0 0 17 17" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blur" width="2" height="2">
      <feComponentTransfer><feFuncA type="linear" slope="0.05" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <style type="text/css"><![CDATA[
@keyframes am-weather-cloud-2 { 0% { transform: translate(-2px,0px); } 50% { transform: translate(1px,0px); } 100% { transform: translate(-2px,0px); } }
.am-weather-cloud-2 { animation-name: am-weather-cloud-2; animation-duration: 8s; animation-timing-function: linear; animation-iteration-count: infinite; }
@keyframes am-weather-sun { 0% { transform: rotate(0deg); } 50% { transform: rotate(360deg); } 100% { transform: rotate(360deg); } }
.am-weather-sun { animation-name: am-weather-sun; animation-duration: 18s; animation-timing-function: linear; animation-iteration-count: infinite; }
@keyframes am-weather-rain { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -100; } }
.am-weather-rain-2 { animation-name: am-weather-rain; animation-duration: 8s; animation-timing-function: linear; animation-iteration-count: infinite; }
.am-weather-easing-ease-in-out { animation-timing-function: ease-in-out; }
]]></style>
  </defs>
  <g filter="url(#blur)" id="rainy-1-day">
    <!-- SUN (Tinier and top-left) -->
    <g transform="matrix(0.8,0,0,0.8,18,8)">
      <g transform="translate(0,13)">
        <g class="am-weather-sun">
          <g><line fill="none" stroke="#fddb4e" stroke-linecap="round" stroke-width="2" transform="translate(0,9)" y2="3" /></g>
          <g transform="rotate(45)"><line fill="none" stroke="#fddb4e" stroke-linecap="round" stroke-width="2" transform="translate(0,9)" y2="3" /></g>
          <g transform="rotate(90)"><line fill="none" stroke="#fddb4e" stroke-linecap="round" stroke-width="2" transform="translate(0,9)" y2="3" /></g>
          <g transform="rotate(135)"><line fill="none" stroke="#fddb4e" stroke-linecap="round" stroke-width="2" transform="translate(0,9)" y2="3" /></g>
          <g transform="scale(-1)"><line fill="none" stroke="#fddb4e" stroke-linecap="round" stroke-width="2" transform="translate(0,9)" y2="3" /></g>
          <g transform="rotate(-135)"><line fill="none" stroke="#fddb4e" stroke-linecap="round" stroke-width="2" transform="translate(0,9)" y2="3" /></g>
          <g transform="rotate(-90)"><line fill="none" stroke="#fddb4e" stroke-linecap="round" stroke-width="2" transform="translate(0,9)" y2="3" /></g>
          <g transform="rotate(-45)"><line fill="none" stroke="#fddb4e" stroke-linecap="round" stroke-width="2" transform="translate(0,9)" y2="3" /></g>
        </g>
        <circle fill="#fddb4e" r="5" stroke="#fddb4e" stroke-width="2" />
      </g>
    </g>
    <!-- BASE RAINY-1 (Cloud + Rain) -->
    <g transform="matrix(1.2544498,0,0,1.2544498,15.892354,-2.1717229)">
      <g class="am-weather-cloud-2 am-weather-easing-ease-in-out">
        <path d="m 47.7,35.4 c 0,-4.6 -3.7,-8.2 -8.2,-8.2 -1,0 -1.9,0.2 -2.8,0.5 -0.3,-3.4 -3.1,-6.2 -6.6,-6.2 -3.7,0 -6.7,3 -6.7,6.7 0,0.8 0.2,1.6 0.4,2.3 -0.3,-0.1 -0.7,-0.1 -1,-0.1 -3.7,0 -6.7,3 -6.7,6.7 0,3.6 2.9,6.6 6.5,6.7 h 17.2 c 4.4,-0.5 7.9,-4 7.9,-8.4 z" fill="#d4d4d4" transform="translate(-20,-11)" />
      </g>
    </g>
    <g transform="matrix(1.2353919,0.21783293,-0.21783293,1.2353919,33.454653,42.98847)">
      <line class="am-weather-rain-2" fill="none" stroke="#91c0f8" stroke-dasharray="4, 7" stroke-linecap="round" stroke-width="2" transform="translate(-3,0)" y2="8" />
    </g>
  </g>
</svg>